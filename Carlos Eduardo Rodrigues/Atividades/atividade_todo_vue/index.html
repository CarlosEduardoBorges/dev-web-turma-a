<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>
</head>
<body>

  <div id="app">
    <h1>Lista de Tarefas</h1>
    <p>{{ mensagem }}</p>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          mensagem: 'Vue funcionando!'
        }
      }
    }).mount('#app')
  </script>

</body>
</html>

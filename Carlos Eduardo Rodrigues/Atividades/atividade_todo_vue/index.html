<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Tarefas</title>
</head>
<body>

  <div id="app">
    <h1>Tarefas</h1>

    <div>
      <input type="text" v-model="novaTarefa" placeholder="Digite sua Tarefa!">
      <button @click="adicionarTarefa">+</button>
    </div>

    <ul>
      <li v-for="(tarefa, index) in tarefas" :key="index"
          @click.self="marcarConcluida(index)"
          :class="{ concluida: tarefa.concluida }">
        {{ tarefa.texto }}
        <button @click="removerTarefa(index)">x</button>
      </li>
    </ul>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          novaTarefa: '',
          tarefas: []
        }
      },
      methods: {
        adicionarTarefa() {
          if (this.novaTarefa.trim() === '') return
          this.tarefas.push({
            texto: this.novaTarefa,
            concluida: false
          })
          this.novaTarefa = ''
        },
        marcarConcluida(index) {
          this.tarefas[index].concluida = !this.tarefas[index].concluida
        },
        removerTarefa(index) {
          this.tarefas.splice(index, 1)
        }
      }
    }).mount('#app')
  </script>

</body>
</html>

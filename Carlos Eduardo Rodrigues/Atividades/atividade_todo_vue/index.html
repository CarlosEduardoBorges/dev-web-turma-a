<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>
</head>
<body>

  <div id="app">
    <h1>Lista de Tarefas</h1>

    <div>
      <input type="text" v-model="novaTarefa" placeholder="Nova tarefa...">
      <button @click="adicionarTarefa">Adicionar</button>
    </div>

    <ul>
      <li v-for="(tarefa, index) in tarefas" :key="index">
        <input type="checkbox" v-model="tarefa.concluida">
        <span>{{ tarefa.texto }}</span>
        <button @click="removerTarefa(index)">Remover</button>
      </li>
    </ul>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          novaTarefa: '',
          tarefas: []
        }
      },
      methods: {
        adicionarTarefa() {
          if (this.novaTarefa.trim() === '') return
          this.tarefas.push({
            texto: this.novaTarefa,
            concluida: false
          })
          this.novaTarefa = ''
        },
        removerTarefa(index) {
          this.tarefas.splice(index, 1)
        }
      }
    }).mount('#app')
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { text-align: center; }
    .entrada { display: flex; gap: 8px; margin-bottom: 20px; }
    input[type="text"] { flex: 1; padding: 8px; font-size: 15px; }
    button { padding: 8px 14px; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }
    li.concluida { text-decoration: line-through; color: gray; }
    .fechar {
      background: none;
      border: none;
      color: red;
      font-size: 16px;
      cursor: pointer;
      margin-left: 10px;
    }
    p { color: gray; text-align: center; }
  </style>
</head>
<body>

  <div id="app">
    <h1>Lista de Tarefas</h1>

    <div class="entrada">
      <input type="text" v-model="novaTarefa"
        placeholder="Nova tarefa..."
        @keyup.enter="adicionarTarefa">
      <button @click="adicionarTarefa">Adicionar</button>
    </div>

    <ul>
      <li v-for="(tarefa, index) in tarefas" :key="index"
          @click.self="marcarConcluida(index)"
          :class="{ concluida: tarefa.concluida }">
        {{ tarefa.texto }}
        <button class="fechar" @click="removerTarefa(index)">x</button>
      </li>
    </ul>

    <p v-if="tarefas.length === 0">Nenhuma tarefa ainda.</p>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          novaTarefa: '',
          tarefas: []
        }
      },
      methods: {
        adicionarTarefa() {
          if (this.novaTarefa.trim() === '') return
          this.tarefas.push({
            texto: this.novaTarefa,
            concluida: false
          })
          this.novaTarefa = ''
        },
        marcarConcluida(index) {
          this.tarefas[index].concluida = !this.tarefas[index].concluida
        },
        removerTarefa(index) {
          this.tarefas.splice(index, 1)
        }
      }
    }).mount('#app')
  </script>

</body>
</html>

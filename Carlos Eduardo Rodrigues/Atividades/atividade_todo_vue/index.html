<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>
</head>
<body>

  <div id="app">
    <h1>Lista de Tarefas</h1>

    <div>
      <input type="text" placeholder="Nova tarefa...">
      <button>Adicionar</button>
    </div>

    <ul>
      <li v-for="(tarefa, index) in tarefas" :key="index">
        {{ tarefa.texto }}
      </li>
    </ul>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          novaTarefa: '',
          tarefas: [
            { texto: 'Estudar Vue', concluida: false },
            { texto: 'Fazer a atividade', concluida: false }
          ]
        }
      }
    }).mount('#app')
  </script>

</body>
</html>
